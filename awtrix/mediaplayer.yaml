blueprint:
  name: Awtrix Media Player Display
  description: Displays the current song title and artist on the Awtrix display.
  domain: automation
  author: zthijs
  input:
    awtrix_3:
      name: Awtrix Display
      description: Select the target Awtrix display.
      selector:
        device:
          model: AWTRIX 3
          multiple: false
    media_player:
      name: Media Player Entity
      description: Select your Media Player.
      selector:
        entity:
          filter:
          - domain:
            - media_player
          multiple: false
          reorder: false
    icon_in:
      name: Icon
      description: Enter the icon name or ID.
      selector:
        text:
          multiple: false
          multiline: false
      default: '647'
    push_icon:
      name: Push Icon
      description: Icon behavior.
      selector:
        select:
          options:
          - label: Icon doesn't move
            value: '0'
          - label: Icon moves with text and will not appear again
            value: '1'
          - label: Icon moves with text but appears again when text restarts
            value: '2'
          mode: dropdown
          multiple: false
          custom_value: false
          sort: false
      default: '0'
    repeat_text:
      name: Repeat
      description: How many times the text should be repeated.
      default: '1'
      selector:
        text:
          multiple: false
          multiline: false
    text_case:
      name: Text Case
      description: How the text should be displayed.
      selector:
        select:
          options:
          - label: Use global setting
            value: '0'
          - label: Force uppercase
            value: '1'
          - label: As reported
            value: '2'
          mode: dropdown
          multiple: false
          custom_value: false
          sort: false
      default: '0'
    display_type:
      name: App / Notification
      description: Show as a custom app (persistent) or a single notification.
      selector:
        select:
          options:
          - label: Notification
            value: '0'
          - label: Custom App
            value: '1'
          mode: dropdown
          multiple: false
          custom_value: false
          sort: false
      default: '1'
    background_color:
      name: Background Color
      description: Select the background color.
      selector:
        color_rgb: {}
      default:
      - 0
      - 0
      - 0
    text_color:
      name: Text Color
      description: Select the text color.
      selector:
        color_rgb: {}
      default:
      - 255
      - 255
      - 255
mode: queued
trigger:
- platform: state
  entity_id: !input media_player
  attribute: media_title
  from:
- platform: state
  entity_id: !input media_player
  from:
variables:
  device_id: !input awtrix_3
  awtrix_3: '{{ iif( device_attr(device_id, ''name_by_user'') != none, device_attr(device_id,
    ''name_by_user''), device_attr(device_id, ''name'') ) }}'
  repeat_text: !input repeat_text
  push_icon: !input push_icon
  icon_in: !input icon_in
  background_color: !input background_color
  text_color: !input text_color
  text_case: !input text_case
  media_player: !input media_player
  display_type: !input display_type
  all_text: '{{state_attr(media_player, ''media_title'')}} - {{state_attr(media_player,
    ''media_artist'')}}'
action:
  if:
  - condition: state
    entity_id: !input media_player
    state: playing
  then:
    if: '{{ display_type == ''1'' }}'
    then:
    - service: mqtt.publish
      data:
        qos: 0
        retain: false
        topic: '{{awtrix_3}}/custom/mediaplayer'
        payload: |-
          {
            "text": "{{ all_text }}",
            "icon": "{{ icon_in }}",
            "background": {{ background_color }},
            "color": {{ text_color }},
            "textCase": {{ text_case }},
            "pushIcon": {{ push_icon }},
            "repeat": {{ repeat_text }}
          }
    else:
    - service: mqtt.publish
      data:
        qos: 0
        retain: false
        topic: '{{awtrix_3}}/notify'
        payload: |-
          {
            "text": "{{ all_text }}",
            "icon": "{{ icon_in }}",
            "background": {{ background_color }},
            "color": {{ text_color }},
            "textCase": {{ text_case }},
            "pushIcon": {{ push_icon }},
            "repeat": {{ repeat_text }}
          }
  else:
  - if: '{{ display_type == ''1'' }}'
    then:
    - service: mqtt.publish
      data:
        qos: 0
        retain: false
        topic: '{{awtrix_3}}/custom/mediaplayer'
        payload: '{}'
