blueprint:
  name: Awtrix Generic Sensor
  description: Displays any sensor value on the Awtrix display with a configurable icon and unit.
  domain: automation
  author: zthijs
  input:
    awtrix_3:
      name: Awtrix Display
      description: Select the target Awtrix display.
      selector:
        device:
          model: "AWTRIX 3"
    sensor_entity:
      name: Sensor
      description: The sensor entity to display.
      selector:
        entity:
          domain: sensor
    unit:
      name: Unit
      description: Unit to append to the sensor value (e.g. %, °C, W).
      default: ""
      selector:
        text:
    mqtt_topic:
      name: MQTT Topic
      description: Unique topic name for this app instance (e.g. my_sensor). Will be published to {display}/custom/{topic}.
      default: "generic_sensor"
      selector:
        text:
    icon_in:
      name: Icon
      description: Enter the icon name or ID.
      default: "1"
      selector:
        text:
    push_icon:
      name: Push Icon
      description: Icon behavior.
      selector:
        select:
          options:
            - label: "Icon doesn't move"
              value: "0"
            - label: "Icon moves with text and will not appear again"
              value: "1"
            - label: "Icon moves with text but appears again when text restarts"
              value: "2"
          mode: dropdown
      default: "2"
    repeat_text:
      name: Repeat
      description: How many times the text should be repeated.
      default: "2"
      selector:
        text:
    text_case:
      name: Text Case
      description: How the text should be displayed.
      selector:
        select:
          options:
            - label: "Use global setting"
              value: "0"
            - label: "Force uppercase"
              value: "1"
            - label: "As reported"
              value: "2"
          mode: dropdown
      default: "0"
    background_color:
      name: Background Color
      description: Select the background color.
      selector:
        color_rgb:
      default: [0, 0, 0]
    text_color:
      name: Text Color
      description: Select the text color.
      selector:
        color_rgb:
      default: [255, 255, 255]

mode: queued

trigger:
  - platform: state
    entity_id: !input sensor_entity

variables:
  device_id: !input awtrix_3
  awtrix_3: "{{ iif( device_attr(device_id, 'name_by_user') != none, device_attr(device_id, 'name_by_user'), device_attr(device_id, 'name') ) }}"
  sensor_entity: !input sensor_entity
  unit: !input unit
  repeat_text: !input repeat_text
  push_icon: !input push_icon
  icon_in: !input icon_in
  background_color: !input background_color
  text_color: !input text_color
  text_case: !input text_case
  mqtt_topic: !input mqtt_topic
  sensor_val: "{{ states(sensor_entity) }}"
  all_text: "{{ sensor_val ~ unit }}"

action:
  - service: mqtt.publish
    data:
      qos: 0
      retain: false
      topic: "{{awtrix_3}}/custom/{{mqtt_topic}}"
      payload: |-
        {
          "text": "{{ all_text }}",
          "icon": "{{ icon_in }}",
          "background": {{ background_color }},
          "color": {{ text_color }},
          "textCase": {{ text_case }},
          "pushIcon": {{ push_icon }},
          "repeat": {{ repeat_text }}
        }
